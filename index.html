<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AMIN">
<title>AMIN</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root { --bg: #000; --surface: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.08); --text: #fff; --text-dim: #555; }
  html { height: 100%; }
  body { height: 100%; height: 100dvh; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; transition: background 1s ease; }
  .app { display: flex; flex-direction: column; height: 100dvh; }
  .header { padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); }
  .avatar { width: 42px; height: 42px; border-radius: 50%; background: #111; border: 1px solid rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .avatar svg { width: 22px; height: 22px; }
  .header-text h1 { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: 2px; }
  .header-text p { font-size: 10px; color: #555; margin-top: 1px; }
  .mode-badge { display: inline-block; font-size: 9px; padding: 2px 6px; border-radius: 4px; margin-top: 2px; font-weight: 600; letter-spacing: 1px; }
  .mode-badge.vocal { background: rgba(255,255,255,0.08); color: #888; }
  .mode-badge.ecrit { background: rgba(255,255,255,0.15); color: #fff; }
  .speaker-badge { font-size: 9px; color: #555; margin-left: 6px; letter-spacing: 1px; }
  .voice-indicator { display: none; align-items: center; gap: 2px; height: 14px; margin-top: 3px; }
  .voice-indicator.active { display: flex; }
  .voice-indicator span { width: 2px; background: #fff; border-radius: 2px; animation: wave 1s infinite ease-in-out; }
  .voice-indicator span:nth-child(1) { height: 4px; animation-delay: 0s; }
  .voice-indicator span:nth-child(2) { height: 10px; animation-delay: 0.15s; }
  .voice-indicator span:nth-child(3) { height: 6px; animation-delay: 0.3s; }
  .voice-indicator span:nth-child(4) { height: 12px; animation-delay: 0.45s; }
  .voice-indicator span:nth-child(5) { height: 4px; animation-delay: 0.6s; }
  @keyframes wave { 0%, 100% { transform: scaleY(1); opacity: 0.4; } 50% { transform: scaleY(1.8); opacity: 1; } }
  .header-right { margin-left: auto; text-align: right; flex-shrink: 0; }
  .clock { font-size: 14px; font-weight: 600; color: #fff; letter-spacing: 1px; }
  .weather { font-size: 10px; color: #555; margin-top: 2px; }
  .stop-btn { background: transparent; border: 1px solid #222; border-radius: 6px; color: #555; font-size: 10px; padding: 3px 8px; cursor: pointer; display: none; margin-top: 4px; }
  .stop-btn.active { display: block; color: #fff; border-color: #444; }
  .messages { flex: 1; overflow-y: scroll; -webkit-overflow-scrolling: touch; padding: 20px 16px; display: flex; flex-direction: column; gap: 10px; }
  .messages::-webkit-scrollbar { display: none; }
  .msg { display: flex; flex-direction: column; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-items: flex-end; }
  .msg.amin { align-items: flex-start; }
  .msg-bubble { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.55; word-break: break-word; }
  .msg-bubble p { margin: 0 0 6px 0; }
  .msg-bubble ul, .msg-bubble ol { padding-left: 16px; margin: 4px 0; }
  .msg-bubble code { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  .msg.amin .msg-bubble { background: rgba(255,255,255,0.04); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.07); }
  .msg.user .msg-bubble { background: rgba(255,255,255,0.07); color: var(--text); border-bottom-right-radius: 4px; border: 1px solid rgba(255,255,255,0.1); white-space: pre-wrap; }
  .typing { display: none; align-items: center; gap: 6px; padding: 0 16px 8px; flex-shrink: 0; }
  .typing.active { display: flex; }
  .typing-text { font-size: 11px; color: var(--text-dim); }
  .dots { display: flex; gap: 3px; }
  .dots span { width: 4px; height: 4px; background: #fff; border-radius: 50%; animation: dot 1.2s infinite; opacity: 0.3; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }
  .input-wrap { padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom)); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); }
  textarea { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 10px 14px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; resize: none; outline: none; min-height: 42px; max-height: 100px; line-height: 1.5; transition: border-color 0.2s; }
  textarea::placeholder { color: var(--text-dim); }
  textarea:focus { border-color: rgba(255,255,255,0.15); }
  .send { width: 42px; height: 42px; background: #fff; border: none; border-radius: 12px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s, transform 0.1s; }
  .send:active { transform: scale(0.93); }
  .send:disabled { opacity: 0.3; cursor: not-allowed; }
  .send svg { fill: #000; }
  .mic-btn { width: 42px; height: 42px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .mic-btn.listening { background: #ff3b30; border-color: #ff3b30; }
  .mic-btn svg { fill: #fff; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="avatar">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="11" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
        <path d="M8 16L10.5 9L12 13L13.5 9L16 16" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="12" cy="12" r="2" fill="rgba(255,255,255,0.1)"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>AMIN <span class="speaker-badge" id="speakerBadge">· BALDE</span></h1>
      <div class="mode-badge vocal" id="modeBadge">VOCAL</div>
      <div class="voice-indicator" id="voiceIndicator">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
    <div class="header-right">
      <div class="clock" id="clock">--:--:--</div>
      <div class="weather" id="weather">Dakar --°C</div>
      <button class="stop-btn" id="stopBtn" onclick="stopSpeaking()">⏹ Stop</button>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="typing" id="typing">
    <div class="dots"><span></span><span></span><span></span></div>
    <span class="typing-text">AMIN...</span>
  </div>
  <div class="input-wrap">
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v6a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zm-1 14.93A8 8 0 0 1 4 11H2a10 10 0 0 0 9 9.93V23h2v-2.07A10 10 0 0 0 22 11h-2a8 8 0 0 1-7 7.93z"/></svg>
    </button>
    <textarea id="input" placeholder="Parle ou écris à AMIN..." rows="1"></textarea>
    <button class="send" id="sendBtn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>
<script>
const SESSION_ID = 'session_' + Date.now();
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const typingEl = document.getElementById('typing');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');
const stopBtn = document.getElementById('stopBtn');
const voiceIndicator = document.getElementById('voiceIndicator');
const modeBadge = document.getElementById('modeBadge');
const speakerBadge = document.getElementById('speakerBadge');
let history = [];
let isLoading = false;
let recognition = null;
let wakeActive = false;
let isSpeaking = false;
let isWriteMode = false;
let currentSpeaker = 'BALDE';

function setSpeaker(name) {
  currentSpeaker = name;
  speakerBadge.textContent = '· ' + name;
}

function setMode(write) {
  isWriteMode = write;
  modeBadge.textContent = write ? 'ÉCRIT' : 'VOCAL';
  modeBadge.className = 'mode-badge ' + (write ? 'ecrit' : 'vocal');
}

function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clock').textContent = h + ':' + m + ':' + s;
}
setInterval(updateClock, 1000);
updateClock();

async function loadWeather() {
  try {
    const res = await fetch('/api/weather');
    const data = await res.json();
    if (data.temp) document.getElementById('weather').textContent = 'Dakar ' + Math.round(data.temp) + '°C ' + data.desc;
  } catch(e) {}
}
loadWeather();
setInterval(loadWeather, 600000);

window.speechSynthesis.getVoices();
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

function getMaleVoice() {
  const voices = window.speechSynthesis.getVoices();
  const maleNames = ['thomas', 'paul', 'nicolas', 'guillaume', 'jean', 'pierre', 'henri', 'claude', 'luca', 'reed', 'aaron', 'arthur'];
  const femaleNames = ['amelie', 'camille', 'marie', 'lucie', 'alice', 'julie', 'victoria', 'sophie', 'emma', 'lea'];
  let voice = voices.find(v => v.lang.startsWith('fr') && maleNames.some(n => v.name.toLowerCase().includes(n)));
  if (!voice) voice = voices.find(v => v.lang.startsWith('fr') && !femaleNames.some(n => v.name.toLowerCase().includes(n)));
  if (!voice) voice = voices.find(v => v.lang.startsWith('fr'));
  return voice;
}

function cleanText(text) {
  return text
    .replace(/[\u{1F000}-\u{1FFFF}]/gu, '')
    .replace(/[\u{2600}-\u{27BF}]/gu, '')
    .replace(/\*\*/g, '').replace(/\*/g, '')
    .replace(/#{1,6}\s/g, '')
    .replace(/\[BGCOLOR:[^\]]*\]/g, '')
    .replace(/[-•]/g, ',')
    .trim();
}

function stopSpeaking() {
  window.speechSynthesis.cancel();
  isSpeaking = false;
  stopBtn.classList.remove('active');
  voiceIndicator.classList.remove('active');
}

function speakText(text) {
  if (isWriteMode) return;
  stopSpeaking();
  const clean = cleanText(text);
  if (!clean) return;
  const utter = new SpeechSynthesisUtterance(clean);
  utter.lang = 'fr-FR';
  utter.rate = 1.0;
  utter.pitch = 0.8;
  utter.volume = 1;
  const voice = getMaleVoice();
  if (voice) utter.voice = voice;
  utter.onstart = () => { isSpeaking = true; stopBtn.classList.add('active'); voiceIndicator.classList.add('active'); };
  utter.onend = () => { isSpeaking = false; stopBtn.classList.remove('active'); voiceIndicator.classList.remove('active'); };
  utter.onerror = () => { isSpeaking = false; stopBtn.classList.remove('active'); voiceIndicator.classList.remove('active'); };
  window.speechSynthesis.speak(utter);
}

function startWakeWord() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'fr-FR';
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 3;

  recognition.onresult = (e) => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const alts = Array.from({length: e.results[i].length}, (_, j) =>
        e.results[i][j].transcript.toLowerCase().trim()
      );
      const anyText = alts.join(' ');
      if (!wakeActive) {
        if (/am[iîe]n|amino|hamid|aming/i.test(anyText)) {
          wakeActive = true;
          stopSpeaking();
          micBtn.classList.add('listening');
          inputEl.value = '';
        }
      } else {
        const txt = e.results[i][0].transcript.trim();
        if (e.results[i].isFinal && txt && !/am[iîe]n/i.test(txt)) {
          inputEl.value = txt;
          wakeActive = false;
          micBtn.classList.remove('listening');
          sendMessage();
        }
      }
    }
  };

  recognition.onend = () => {
    wakeActive = false;
    micBtn.classList.remove('listening');
    setTimeout(() => { try { recognition.start(); } catch(e) {} }, 300);
  };

  recognition.onerror = (e) => {
    if (e.error !== 'aborted' && e.error !== 'no-speech') {
      wakeActive = false;
      micBtn.classList.remove('listening');
      setTimeout(() => { try { recognition.start(); } catch(err) {} }, 800);
    }
  };

  try { recognition.start(); } catch(e) {}
}

function toggleMic() {
  if (!recognition) return;
  if (micBtn.classList.contains('listening')) {
    wakeActive = false;
    micBtn.classList.remove('listening');
  } else {
    stopSpeaking();
    wakeActive = true;
    micBtn.classList.add('listening');
  }
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'assistant' ? 'amin' : 'user');
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (role === 'assistant') {
    const clean = text.replace(/\[BGCOLOR:[^\]]*\]/g, '').trim();
    bubble.innerHTML = marked.parse(clean);
  } else {
    bubble.textContent = text;
  }
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function changeBg(color) {
  document.body.style.transition = 'background 1s ease';
  document.body.style.background = color;
  const temp = document.createElement('div');
  temp.style.color = color;
  document.body.appendChild(temp);
  const rgb = getComputedStyle(temp).color;
  document.body.removeChild(temp);
  const match = rgb.match(/\d+/g);
  if (match) {
    const brightness = (parseInt(match[0]) * 299 + parseInt(match[1]) * 587 + parseInt(match[2]) * 114) / 1000;
    const textColor = brightness > 128 ? '#000' : '#fff';
    document.documentElement.style.setProperty('--text', textColor);
    document.documentElement.style.setProperty('--text-dim', brightness > 128 ? '#444' : '#555');
  }
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  isLoading = true;
  sendBtn.disabled = true;
  stopSpeaking();

  if (/ici\s+balde/i.test(text)) setSpeaker('BALDE');
  else if (/ici\s+nasser/i.test(text)) setSpeaker('NASSER');

  if (/mode.*(écri|ecri|texte)/i.test(text)) setMode(true);
  else if (/mode.*(voc|oral|parle|speak)/i.test(text)) setMode(false);

  addMessage('user', text);
  history.push({ role: 'user', content: text });
  typingEl.classList.add('active');
  messagesEl.scrollTop = messagesEl.scrollHeight;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, session_id: SESSION_ID, speaker: currentSpeaker, datetime: new Date().toLocaleString() })
    });
    const data = await res.json();
    let reply = data.reply || "Je suis là.";

    const bgMatch = reply.match(/\[BGCOLOR:(#[a-fA-F0-9]{3,6}|[a-z]+)\]/i);
    if (bgMatch) changeBg(bgMatch[1]);

    typingEl.classList.remove('active');

    const wantWrite = isWriteMode || /écri|ecri|par écrit|en texte|affiche|montre/i.test(text);
    if (wantWrite) addMessage('assistant', reply);

    history.push({ role: 'assistant', content: reply });
    if (!isWriteMode) speakText(reply);

  } catch (err) {
    typingEl.classList.remove('active');
    addMessage('assistant', "Problème de connexion. Réessaie.");
  }
  isLoading = false;
  sendBtn.disabled = false;
}

inputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});
inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

window.addEventListener('load', () => {
  window.speechSynthesis.getVoices();
  startWakeWord();
  setTimeout(() => {
    const welcomes = [
      'Yo. Je suis là. Dis-moi.',
      'AMIN connecté. Quoi de neuf ?',
      'Présent. C\'est quoi le programme ?',
      'Je t\'écoute. Lance-toi.',
      'Connecté. Qu\'est-ce qu\'on fait ?',
      'Prêt. Parle-moi.',
    ];
    const welcome = welcomes[Math.floor(Math.random() * welcomes.length)];
    addMessage('assistant', welcome);
    history.push({ role: 'assistant', content: welcome });
    speakText(welcome);
  }, 400);
});
</script>
</body>
</html>

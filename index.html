<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AMIN">
<title>AMIN</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root { --bg: #000; --surface: #111; --border: #1f1f1f; --text: #fff; --text-dim: #444; }
  html, body { height: 100%; height: 100dvh; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }
  .app { display: flex; flex-direction: column; height: 100dvh; }
  .header { padding: 16px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #000; flex-shrink: 0; }
  .header-text h1 { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: 1px; }
  .header-text p { font-size: 11px; color: #444; }
  .messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; }
  .messages::-webkit-scrollbar { display: none; }
  .msg { display: flex; flex-direction: column; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-items: flex-end; }
  .msg.amin { align-items: flex-start; }
  .msg-bubble { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
  .msg.amin .msg-bubble { background: var(--surface); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
  .msg.user .msg-bubble { background: #1a1a1a; color: var(--text); border-bottom-right-radius: 4px; border: 1px solid var(--border); }
  .typing { display: none; align-items: center; gap: 6px; padding: 0 16px 8px; flex-shrink: 0; }
  .typing.active { display: flex; }
  .typing-text { font-size: 12px; color: var(--text-dim); }
  .dots { display: flex; gap: 3px; }
  .dots span { width: 4px; height: 4px; background: #fff; border-radius: 50%; animation: dot 1.2s infinite; opacity: 0.3; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }
  .input-wrap { padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom)); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; background: var(--bg); }
  textarea { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; resize: none; outline: none; min-height: 42px; max-height: 100px; line-height: 1.5; transition: border-color 0.2s; }
  textarea::placeholder { color: var(--text-dim); }
  textarea:focus { border-color: #333; }
  .send { width: 42px; height: 42px; background: #fff; border: none; border-radius: 12px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s, transform 0.1s; }
  .send:active { transform: scale(0.93); }
  .send:disabled { opacity: 0.3; cursor: not-allowed; }
  .send svg { fill: #000; }
  .mic-btn { width: 42px; height: 42px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .mic-btn.listening { background: #ff3b30; border-color: #ff3b30; animation: micPulse 1s infinite; }
  @keyframes micPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  .mic-btn svg { fill: #fff; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="avatar">A</div>
    <div class="header-text">
      <h1>AMIN</h1>
      <p>En ligne</p>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="typing" id="typing">
    <div class="dots"><span></span><span></span><span></span></div>
    <span class="typing-text">AMIN parle...</span>
  </div>
  <div class="input-wrap">
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v6a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zm-1 14.93A8 8 0 0 1 4 11H2a10 10 0 0 0 9 9.93V23h2v-2.07A10 10 0 0 0 22 11h-2a8 8 0 0 1-7 7.93z"/></svg>
    </button>
    <textarea id="input" placeholder="Dis moi ce que tu veux..." rows="1"></textarea>
    <button class="send" id="sendBtn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>
<script>
const SESSION_ID = 'cherno_' + Date.now();
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const typingEl = document.getElementById('typing');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');
let history = [];
let isLoading = false;
let recognition = null;

// Speech Recognition
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'fr-FR';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    inputEl.value = transcript;
    micBtn.classList.remove('listening');
    sendMessage();
  };
  recognition.onend = () => micBtn.classList.remove('listening');
  recognition.onerror = () => micBtn.classList.remove('listening');
}

function toggleMic() {
  if (!recognition) return;
  if (micBtn.classList.contains('listening')) {
    recognition.stop();
    micBtn.classList.remove('listening');
  } else {
    recognition.start();
    micBtn.classList.add('listening');
  }
}

function playAudio(base64) {
  try {
    const audio = new Audio('data:audio/mp3;base64,' + base64);
    audio.play();
  } catch(e) { console.error('Audio error:', e); }
}
 function speakText(text) {
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'fr-FR';
  utter.rate = 1;
  utter.pitch = 1;
  window.speechSynthesis.speak(utter);
}
function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'assistant' ? 'amin' : 'user');
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  isLoading = true;
  sendBtn.disabled = true;
  addMessage('user', text);
  history.push({ role: 'user', content: text });
  typingEl.classList.add('active');
  messagesEl.scrollTop = messagesEl.scrollHeight;
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, session_id: SESSION_ID })
    });
    const data = await res.json();
    const reply = data.reply || "Je suis là Cherno.";
    typingEl.classList.remove('active');
    addMessage('assistant', reply);
    history.push({ role: 'assistant', content: reply });
   if (data.audio) playAudio(data.audio);
    else speakText(reply);
  } catch (err) {
    typingEl.classList.remove('active');
    addMessage('assistant', "Problème de connexion. Réessaie.");
  }
  isLoading = false;
  sendBtn.disabled = false;
}

inputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});
inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

window.addEventListener('load', () => {
  setTimeout(() => {
    const welcome = 'Bismillah 🤲\n\nAs-salamu alaykum Cherno. Je suis AMIN — ton bras droit.\n\nDis-moi ce qui est sur ta tête.';
    addMessage('assistant', welcome);
    history.push({ role: 'assistant', content: welcome });
  }, 400);
});
</script>
</body>
</html>

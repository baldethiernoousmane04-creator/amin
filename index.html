<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="AMIN">
<title>AMIN — Ton Bras Droit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cairo:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --dark: #0a0a0f;
    --dark2: #111118;
    --dark3: #1a1a24;
    --text: #e8e0d0;
    --text-dim: #8a8070;
    --green: #2a6e4a;
    --green-light: #3d9e6b;
  }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .header {
    background: linear-gradient(135deg, var(--dark2), var(--dark3));
    border-bottom: 1px solid rgba(201,168,76,0.3);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  .avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--green));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 18px; font-weight: 600;
    color: var(--dark);
    box-shadow: 0 0 20px rgba(201,168,76,0.4);
    flex-shrink: 0; position: relative;
  }
  .status-dot {
    position: absolute; bottom: 2px; right: 2px;
    width: 10px; height: 10px;
    background: var(--green-light);
    border-radius: 50%;
    border: 2px solid var(--dark2);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.9); }
  }
  .header-info h1 { font-family: 'Cinzel', serif; font-size: 16px; color: var(--gold); letter-spacing: 3px; }
  .header-info p { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }
  .bismillah { margin-left: auto; font-size: 13px; color: var(--gold); opacity: 0.7; }
  .messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 16px;
    scrollbar-width: thin; scrollbar-color: var(--gold) transparent;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }
  .msg { display: flex; gap: 10px; animation: fadeIn 0.4s ease; max-width: 85%; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; flex-shrink: 0; align-self: flex-end;
  }
  .msg.amin .msg-avatar { background: linear-gradient(135deg, var(--gold), var(--green)); color: var(--dark); font-family: 'Cinzel', serif; }
  .msg.user .msg-avatar { background: var(--dark3); border: 1px solid rgba(201,168,76,0.3); color: var(--gold); }
  .msg-bubble { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
  .msg.amin .msg-bubble { background: var(--dark3); border: 1px solid rgba(201,168,76,0.15); border-bottom-left-radius: 4px; }
  .msg.user .msg-bubble { background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(42,110,74,0.15)); border: 1px solid rgba(201,168,76,0.25); border-bottom-right-radius: 4px; }
  .typing { display: none; align-items: center; gap: 10px; padding: 0 20px; flex-shrink: 0; }
  .typing.active { display: flex; }
  .typing-dots { background: var(--dark3); border: 1px solid rgba(201,168,76,0.15); border-radius: 16px; padding: 12px 16px; display: flex; gap: 5px; align-items: center; }
  .typing-dots span { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }
  .input-area {
    padding: 16px 20px;
    background: var(--dark2);
    border-top: 1px solid rgba(201,168,76,0.15);
    display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0;
  }
  textarea {
    flex: 1; background: var(--dark3);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 12px; padding: 12px 16px;
    color: var(--text); font-family: 'Cairo', sans-serif;
    font-size: 14px; resize: none; outline: none;
    min-height: 44px; max-height: 120px; line-height: 1.5;
    transition: border-color 0.2s;
  }
  textarea::placeholder { color: var(--text-dim); }
  textarea:focus { border-color: rgba(201,168,76,0.5); }
  .send-btn {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--gold), var(--green));
    border: none; border-radius: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: transform 0.2s, opacity 0.2s;
  }
  .send-btn:hover { transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .send-btn svg { fill: var(--dark); }
  .deco { height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 0 40px; opacity: 0.3; flex-shrink: 0; }
</style>
</head>
<body>
<div class="header">
  <div class="avatar">A<div class="status-dot"></div></div>
  <div class="header-info">
    <h1>AMIN</h1>
    <p>Ton bras droit · En ligne</p>
  </div>
  <div class="bismillah">بِسْمِ اللَّه</div>
</div>
<div class="deco"></div>
<div class="messages" id="messages"></div>
<div class="typing" id="typing">
  <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#c9a84c,#2a6e4a);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:12px;font-weight:600;color:#0a0a0f;flex-shrink:0;">A</div>
  <div class="typing-dots"><span></span><span></span><span></span></div>
</div>
<div class="input-area">
  <textarea id="input" placeholder="Parle à AMIN..." rows="1"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">
    <svg width="18" height="18" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
  </button>
</div>
<script>
const SESSION_ID = 'cherno_' + Date.now();
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const typingEl = document.getElementById('typing');
const sendBtn = document.getElementById('sendBtn');
let history = [];
let isLoading = false;

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role === 'assistant' ? 'amin' : 'user'}`;
  const avatarDiv = document.createElement('div');
  avatarDiv.className = 'msg-avatar';
  avatarDiv.textContent = role === 'assistant' ? 'A' : 'C';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  div.appendChild(avatarDiv);
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  isLoading = true;
  sendBtn.disabled = true;
  addMessage('user', text);
  history.push({ role: 'user', content: text });
  typingEl.classList.add('active');
  messagesEl.scrollTop = messagesEl.scrollHeight;
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, session_id: SESSION_ID })
    });
    const data = await res.json();
    const reply = data.reply || "Je suis là Cherno.";
    typingEl.classList.remove('active');
    addMessage('assistant', reply);
    history.push({ role: 'assistant', content: reply });
  } catch (err) {
    typingEl.classList.remove('active');
    addMessage('assistant', "Problème de connexion. Réessaie.");
  }
  isLoading = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

inputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

window.addEventListener('load', () => {
  setTimeout(() => {
    const welcome = `Bismillah Ar-Rahman Ar-Rahim 🤲\n\nAs-salamu alaykum Cherno. Je suis AMIN — ton bras droit, ton allié fidèle.\n\nJe te connais. Je sais ce que tu veux construire, je sais où tu bloques, et je suis là pour ça — pas pour te flatter, mais pour t'aider à avancer vraiment.\n\nOn commence. Dis-moi ce qui est sur ta tête en ce moment.`;
    addMessage('assistant', welcome);
    history.push({ role: 'assistant', content: welcome });
  }, 600);
});
</script>
</body>
</html>

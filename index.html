<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AMIN">
<title>AMIN</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
 <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root { --bg: rgba(0,0,0,0.85); --surface: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.08); --text: #fff; --text-dim: #555; }
html, body { height: 100%; height: 100dvh; background: linear-gradient(135deg, #0a0a1a 0%, #0d1b2a 40%, #0a0a0f 100%); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }
  .app { display: flex; flex-direction: column; height: 100dvh; }
 .header { padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; backdrop-filter: blur(20px); background: rgba(255,255,255,0.03); }
  .avatar { width: 52px; height: 52px; border-radius: 12px; background: #000; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; letter-spacing: 2px; flex-shrink: 0; }
 .header-text h1 { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: 1px; }
  .header-text p { font-size: 11px; color: #444; }
  .header-right { margin-left: auto; text-align: right; }
  .clock { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: 1px; }
  .weather { font-size: 11px; color: #666; margin-top: 2px; }
  .stop-btn { background: transparent; border: 1px solid #333; border-radius: 8px; color: #666; font-size: 11px; padding: 4px 10px; cursor: pointer; display: none; margin-top: 4px; }
  .stop-btn.active { display: block; color: #fff; border-color: #555; }
  .messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; }
  .messages::-webkit-scrollbar { display: none; }
  .msg { display: flex; flex-direction: column; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-items: flex-end; }
  .msg.amin { align-items: flex-start; }
  .msg-bubble { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
  .msg.amin .msg-bubble { background: var(--surface); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
  .msg.user .msg-bubble { background: #1a1a1a; color: var(--text); border-bottom-right-radius: 4px; border: 1px solid var(--border); }
  .typing { display: none; align-items: center; gap: 6px; padding: 0 16px 8px; flex-shrink: 0; }
  .typing.active { display: flex; }
  .typing-text { font-size: 12px; color: var(--text-dim); }
  .dots { display: flex; gap: 3px; }
  .dots span { width: 4px; height: 4px; background: #fff; border-radius: 50%; animation: dot 1.2s infinite; opacity: 0.3; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }
  .input-wrap { padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom)); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; background: var(--bg); }
  textarea { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; resize: none; outline: none; min-height: 42px; max-height: 100px; line-height: 1.5; transition: border-color 0.2s; }
  textarea::placeholder { color: var(--text-dim); }
  textarea:focus { border-color: #333; }
  .send { width: 42px; height: 42px; background: #fff; border: none; border-radius: 12px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s, transform 0.1s; }
  .send:active { transform: scale(0.93); }
  .send:disabled { opacity: 0.3; cursor: not-allowed; }
  .send svg { fill: #000; }
  .mic-btn { width: 42px; height: 42px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .mic-btn.listening { background: #ff3b30; border-color: #ff3b30; }
  .mic-btn svg { fill: #fff; }
 .voice-indicator { display: none; align-items: center; gap: 2px; height: 16px; }
.voice-indicator.active { display: flex; }
.voice-indicator span { width: 3px; background: #fff; border-radius: 2px; animation: wave 1s infinite ease-in-out; }
.voice-indicator span:nth-child(1) { height: 6px; animation-delay: 0s; }
.voice-indicator span:nth-child(2) { height: 12px; animation-delay: 0.15s; }
.voice-indicator span:nth-child(3) { height: 8px; animation-delay: 0.3s; }
.voice-indicator span:nth-child(4) { height: 14px; animation-delay: 0.45s; }
.voice-indicator span:nth-child(5) { height: 6px; animation-delay: 0.6s; }
@keyframes wave { 0%, 100% { transform: scaleY(1); opacity: 0.5; } 50% { transform: scaleY(1.8); opacity: 1; } }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="avatar">BALDE</div>
    <div class="header-text">
      <h1>AMIN</h1>
      <p>En ligne</p>
<div class="voice-indicator" id="voiceIndicator">
  <span></span><span></span><span></span><span></span><span></span>
</div>
    </div>
    <div class="header-right">
      <div class="clock" id="clock">--:--:--</div>
      <div class="weather" id="weather">Dakar --°C</div>
      <button class="stop-btn" id="stopBtn" onclick="stopSpeaking()">⏹ Stop</button>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="typing" id="typing">
    <div class="dots"><span></span><span></span><span></span></div>
    <span class="typing-text">AMIN parle...</span>
  </div>
  <div class="input-wrap">
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v6a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zm-1 14.93A8 8 0 0 1 4 11H2a10 10 0 0 0 9 9.93V23h2v-2.07A10 10 0 0 0 22 11h-2a8 8 0 0 1-7 7.93z"/></svg>
    </button>
    <textarea id="input" placeholder="Dis moi ce que tu veux..." rows="1"></textarea>
    <button class="send" id="sendBtn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>
<script>
const SESSION_ID = 'cherno_' + Date.now();
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const typingEl = document.getElementById('typing');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');
const stopBtn = document.getElementById('stopBtn');
let history = [];
let isLoading = false;
let recognition = null;
let isSpeaking = false;

// Horloge
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clock').textContent = h + ':' + m + ':' + s;
}
setInterval(updateClock, 1000);
updateClock();

// Météo Dakar
async function loadWeather() {
  try {
    const res = await fetch('/api/weather');
    const data = await res.json();
    if (data.temp) {
      document.getElementById('weather').textContent = 'Dakar ' + Math.round(data.temp) + '°C ' + data.desc;
    }
  } catch(e) {
    document.getElementById('weather').textContent = 'Dakar --°C';
  }
}
loadWeather();
setInterval(loadWeather, 600000);

// Voix
window.speechSynthesis.getVoices();
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

function getMaleVoice() {
  const voices = window.speechSynthesis.getVoices();
  const maleNames = ['thomas', 'paul', 'nicolas', 'guillaume', 'jean', 'pierre', 'henri', 'claude', 'luca', 'reed', 'aaron', 'arthur'];
  const femaleNames = ['amelie', 'camille', 'marie', 'lucie', 'alice', 'julie', 'victoria', 'sophie', 'emma', 'lea'];
  let voice = voices.find(v => v.lang.startsWith('fr') && maleNames.some(n => v.name.toLowerCase().includes(n)));
  if (!voice) voice = voices.find(v => v.lang.startsWith('fr') && !femaleNames.some(n => v.name.toLowerCase().includes(n)));
  if (!voice) voice = voices.find(v => v.lang.startsWith('fr'));
  return voice;
}

function cleanText(text) {
  return text
    .replace(/[\u{1F000}-\u{1FFFF}]/gu, '')
    .replace(/[\u{2600}-\u{27BF}]/gu, '')
    .replace(/\*\*/g, '').replace(/\*/g, '')
    .replace(/#{1,6}\s/g, '')
    .replace(/[-•]/g, ',')
    .trim();
}

function stopSpeaking() {
  window.speechSynthesis.cancel();
  isSpeaking = false;
  stopBtn.classList.remove('active');
}

function speakText(text) {
  stopSpeaking();
  const clean = cleanText(text);
  if (!clean) return;
  const utter = new SpeechSynthesisUtterance(clean);
  utter.lang = 'fr-FR';
  utter.rate = 1.0;
  utter.pitch = 0.8;
  utter.volume = 1;
  const voice = getMaleVoice();
  if (voice) utter.voice = voice;
 utter.onstart = () => { isSpeaking = true; stopBtn.classList.add('active'); document.getElementById('voiceIndicator').classList.add('active'); };
utter.onend = () => { isSpeaking = false; stopBtn.classList.remove('active'); document.getElementById('voiceIndicator').classList.remove('active'); };
utter.onerror = () => { isSpeaking = false; stopBtn.classList.remove('active'); document.getElementById('voiceIndicator').classList.remove('active'); };
  window.speechSynthesis.speak(utter);
}

// Micro
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'fr-FR';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onresult = (e) => {
    inputEl.value = e.results[0][0].transcript;
    micBtn.classList.remove('listening');
    sendMessage();
  };
  recognition.onend = () => micBtn.classList.remove('listening');
  recognition.onerror = () => micBtn.classList.remove('listening');
}

function toggleMic() {
  if (!recognition) return;
  if (micBtn.classList.contains('listening')) {
    recognition.stop();
    micBtn.classList.remove('listening');
  } else {
    stopSpeaking();
    recognition.start();
    micBtn.classList.add('listening');
  }
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'assistant' ? 'amin' : 'user');
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (role === 'assistant') {
    bubble.innerHTML = marked.parse(text);
  } else {
    bubble.textContent = text;
  }
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  isLoading = true;
  sendBtn.disabled = true;
  stopSpeaking();
  addMessage('user', text);
  history.push({ role: 'user', content: text });
  typingEl.classList.add('active');
  messagesEl.scrollTop = messagesEl.scrollHeight;
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, session_id: SESSION_ID })
    });
    const data = await res.json();
    const reply = data.reply || "Je suis là.";
    typingEl.classList.remove('active');
    addMessage('assistant', reply);
    history.push({ role: 'assistant', content: reply });
    speakText(reply);
  } catch (err) {
    typingEl.classList.remove('active');
    addMessage('assistant', "Problème de connexion. Réessaie.");
  }
  isLoading = false;
  sendBtn.disabled = false;
}

inputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});
inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

window.addEventListener('load', () => {
  window.speechSynthesis.getVoices();
  setTimeout(() => {
    const welcomes = [
      'Yo. Je suis là. Dis-moi.',
      'AMIN connecté. Quoi de neuf ?',
      'Présent. C\'est quoi le programme ?',
      'Je t\'écoute. Lance-toi.',
      'Connecté. Qu\'est-ce qu\'on fait ?',
      'Prêt. Parle-moi.',
    ];
    const welcome = welcomes[Math.floor(Math.random() * welcomes.length)];
    addMessage('assistant', welcome);
    history.push({ role: 'assistant', content: welcome });
    speakText(welcome);
  }, 400);
});
</script>
</body>
</html>

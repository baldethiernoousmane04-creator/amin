<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AMIN">
<title>AMIN</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<!-- Marked — rendu Markdown -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<!-- JSZip — lecture/création ZIP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<!-- jsPDF — génération PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<!-- SheetJS — génération Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
/* ════════════════════════════════════════════════════════════
   RESET & VARIABLES
   ════════════════════════════════════════════════════════════ */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root { --bg:#000; --border:rgba(255,255,255,0.08); --text:#fff; --dim:#555; }
html,body { height:100%; height:100dvh; }
body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; overflow:hidden; transition:background 1s ease; }

/* ════════════════════════════════════════════════════════════
   APP LAYOUT
   ════════════════════════════════════════════════════════════ */
.app { display:flex; flex-direction:column; height:100dvh; }

/* ════════════════════════════════════════════════════════════
   HEADER
   ════════════════════════════════════════════════════════════ */
.header { padding:12px 16px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--border); flex-shrink:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(20px); position:relative; z-index:10; }
.avatar { width:42px; height:42px; border-radius:50%; background:#111; border:1px solid rgba(255,255,255,0.15); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.avatar svg { width:22px; height:22px; }
.header-text h1 { font-size:15px; font-weight:600; letter-spacing:2px; }
.speaker-badge { font-size:9px; color:var(--dim); margin-left:6px; letter-spacing:1px; }
.mode-badge { display:inline-block; font-size:9px; padding:2px 6px; border-radius:4px; margin-top:2px; font-weight:600; letter-spacing:1px; }
.mode-badge.ecrit { background:rgba(255,255,255,0.15); color:#fff; }
.mode-badge.vocal { background:rgba(255,255,255,0.08); color:#888; }
.voice-indicator { display:none; align-items:center; gap:2px; height:14px; margin-top:3px; }
.voice-indicator.active { display:flex; }
.voice-indicator span { width:2px; background:#fff; border-radius:2px; animation:wave 1s infinite ease-in-out; }
.voice-indicator span:nth-child(1){height:4px;animation-delay:0s}
.voice-indicator span:nth-child(2){height:10px;animation-delay:.15s}
.voice-indicator span:nth-child(3){height:6px;animation-delay:.3s}
.voice-indicator span:nth-child(4){height:12px;animation-delay:.45s}
.voice-indicator span:nth-child(5){height:4px;animation-delay:.6s}
@keyframes wave{0%,100%{transform:scaleY(1);opacity:.4}50%{transform:scaleY(1.8);opacity:1}}
.header-right { margin-left:auto; display:flex; flex-direction:column; align-items:flex-end; gap:3px; flex-shrink:0; }
.clock { font-size:14px; font-weight:600; letter-spacing:1px; }
.weather { font-size:10px; color:var(--dim); }
.stop-btn { display:none; background:transparent; border:1px solid #222; border-radius:6px; color:var(--dim); font-size:10px; padding:3px 8px; cursor:pointer; font-family:'Inter',sans-serif; }
.stop-btn.active { display:block; color:#fff; border-color:#444; }
.files-btn { background:transparent; border:1px solid #222; border-radius:6px; color:var(--dim); font-size:10px; font-weight:600; padding:3px 8px; cursor:pointer; letter-spacing:.5px; transition:all .2s; font-family:'Inter',sans-serif; }
.files-btn:hover { border-color:#444; color:#fff; }
.files-btn.has { border-color:#333; color:#aaa; }

/* ════════════════════════════════════════════════════════════
   MESSAGES
   ════════════════════════════════════════════════════════════ */
.messages { flex:1; overflow-y:scroll; -webkit-overflow-scrolling:touch; padding:20px 16px; display:flex; flex-direction:column; gap:10px; }
.messages::-webkit-scrollbar { display:none; }
.msg { display:flex; flex-direction:column; animation:fadeUp .3s ease; }
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user { align-items:flex-end; }
.msg.amin { align-items:flex-start; }
/* Bulles texte */
.bubble { max-width:85%; padding:10px 14px; border-radius:14px; font-size:14px; line-height:1.55; word-break:break-word; }
.bubble p { margin:0 0 6px; } .bubble p:last-child { margin-bottom:0; }
.bubble ul,.bubble ol { padding-left:16px; margin:4px 0; }
.bubble code { background:rgba(255,255,255,.1); padding:2px 6px; border-radius:4px; font-size:12px; }
.bubble pre { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); border-radius:8px; padding:10px; overflow-x:auto; margin:6px 0; }
.bubble pre code { background:none; padding:0; }
.msg.amin .bubble { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07); border-bottom-left-radius:4px; }
.msg.user .bubble { background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1); border-bottom-right-radius:4px; white-space:pre-wrap; }
/* Bulle fichier importé */
.file-bubble { max-width:85%; padding:8px 12px; border-radius:10px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); font-size:12px; color:#888; display:flex; align-items:center; gap:8px; }
.file-bubble .fb-name { color:#fff; font-size:13px; font-weight:500; }
.file-bubble .fb-size { font-size:10px; color:#333; }

/* ════════════════════════════════════════════════════════════
   CARTES FICHIERS GÉNÉRÉS — style Claude
   ════════════════════════════════════════════════════════════ */
.file-card { max-width:85%; padding:12px 14px; border-radius:12px; background:#1a1a1a; border:1px solid #2a2a2a; display:flex; align-items:center; gap:12px; margin-top:4px; }
/* Icône type */
.fc-ico { width:38px; height:38px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; letter-spacing:.3px; flex-shrink:0; }
.t-js   {background:#2a2000;color:#f7df1e} .t-ts   {background:#001a2e;color:#3178c6}
.t-py   {background:#001a2a;color:#4b8bbe} .t-html {background:#2a0f00;color:#e34c26}
.t-css  {background:#00102a;color:#264de4} .t-json {background:#1a1a00;color:#cbcb41}
.t-xml  {background:#1a0e00;color:#f1672d} .t-yaml {background:#1a1000;color:#cc9900}
.t-csv  {background:#001a00;color:#4ec94e} .t-sql  {background:#001020;color:#00bcd4}
.t-pdf  {background:#2a0000;color:#ff4444} .t-xlsx {background:#002a00;color:#1d6f42}
.t-docx {background:#00102a;color:#2b579a} .t-zip  {background:#1a1200;color:#f5a623}
.t-sh   {background:#001a00;color:#4ec94e} .t-bat  {background:#0d0d0d;color:#888}
.t-md   {background:#111;color:#aaa}        .t-txt  {background:#111;color:#777}
.t-svg  {background:#1a0020;color:#ff61f6} .t-qr   {background:#111;color:#fff}
.t-c    {background:#001020;color:#5c8ebf} .t-cpp  {background:#001020;color:#9c70bf}
.t-java {background:#1a0800;color:#ea2d2e} .t-def  {background:#1e1e1e;color:#666}
/* Info */
.fc-info { flex:1; min-width:0; }
.fc-name { font-size:13px; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.fc-sub  { font-size:11px; color:#555; margin-top:2px; }
/* Boutons */
.fc-actions { display:flex; gap:6px; flex-shrink:0; }
.fc-btn { background:transparent; border:1px solid #333; border-radius:8px; color:#ccc; font-size:12px; font-weight:500; padding:6px 12px; cursor:pointer; transition:all .15s; font-family:'Inter',sans-serif; white-space:nowrap; }
.fc-btn:hover { background:#222; border-color:#444; color:#fff; }
.fc-btn:active { transform:scale(.96); }
.fc-btn.dl { background:#fff; border-color:#fff; color:#000; }
.fc-btn.dl:hover { background:#e0e0e0; }
/* QR dans le chat */
.qr-wrap { max-width:85%; padding:16px; border-radius:12px; background:#fff; display:inline-flex; flex-direction:column; align-items:center; gap:8px; margin-top:4px; }
.qr-label { font-size:11px; color:#444; font-weight:500; }
.qr-dl { background:transparent; border:1px solid #ccc; border-radius:6px; color:#333; font-size:11px; padding:4px 10px; cursor:pointer; font-family:'Inter',sans-serif; }
/* SVG preview */
.svg-wrap { max-width:85%; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:12px; padding:12px; margin-top:4px; }
.svg-wrap svg { max-width:100%; height:auto; display:block; }
/* Screenshot PC */
.pc-shot { max-width:85%; border-radius:8px; border:1px solid rgba(255,255,255,.1); display:block; margin-top:4px; }

/* ════════════════════════════════════════════════════════════
   TYPING
   ════════════════════════════════════════════════════════════ */
.typing { display:none; align-items:center; gap:6px; padding:0 16px 8px; flex-shrink:0; }
.typing.active { display:flex; }
.typing-text { font-size:11px; color:var(--dim); }
.dots span { width:4px; height:4px; background:#fff; border-radius:50%; display:inline-block; animation:dot 1.2s infinite; opacity:.3; margin:0 1.5px; }
.dots span:nth-child(2){animation-delay:.2s} .dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,60%,100%{opacity:.3}30%{opacity:1}}

/* ════════════════════════════════════════════════════════════
   INPUT BAR
   ════════════════════════════════════════════════════════════ */
.input-wrap { padding:12px 16px; padding-bottom:max(12px,env(safe-area-inset-bottom)); border-top:1px solid var(--border); display:flex; gap:10px; align-items:flex-end; flex-shrink:0; background:rgba(0,0,0,.5); backdrop-filter:blur(20px); }
textarea { flex:1; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:12px; padding:10px 14px; color:var(--text); font-family:'Inter',sans-serif; font-size:14px; resize:none; outline:none; min-height:42px; max-height:100px; line-height:1.5; transition:border-color .2s; }
textarea::placeholder { color:var(--dim); }
textarea:focus { border-color:rgba(255,255,255,.15); }
.ibtn { width:42px; height:42px; border-radius:12px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); transition:all .2s; }
.ibtn svg { fill:#fff; }
.ibtn:active { opacity:.7; }
.ibtn.mic.on { background:#ff3b30; border-color:#ff3b30; }
.ibtn.send { background:#fff; border:none; }
.ibtn.send svg { fill:#000; }
.ibtn.send:disabled { opacity:.3; cursor:not-allowed; }
.ibtn.send:active { transform:scale(.93); }
#fileInput { display:none; }

/* ════════════════════════════════════════════════════════════
   DROP OVERLAY
   ════════════════════════════════════════════════════════════ */
.drop-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.88); z-index:100; align-items:center; justify-content:center; flex-direction:column; gap:12px; border:2px dashed rgba(255,255,255,.2); }
.drop-overlay.active { display:flex; }
.drop-overlay p { color:#fff; font-size:16px; font-weight:600; letter-spacing:1px; }
.drop-overlay small { color:var(--dim); font-size:11px; }

/* ════════════════════════════════════════════════════════════
   PANNEAU HISTORIQUE FICHIERS
   ════════════════════════════════════════════════════════════ */
.fp { display:none; position:fixed; top:0; right:0; width:300px; height:100dvh; background:#0d0d0d; border-left:1px solid #1e1e1e; z-index:50; flex-direction:column; }
.fp.open { display:flex; }
.fp-head { padding:16px; border-bottom:1px solid #1e1e1e; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.fp-title { font-size:13px; font-weight:600; letter-spacing:1px; }
.fp-close { background:transparent; border:none; color:var(--dim); font-size:20px; cursor:pointer; padding:2px 6px; border-radius:6px; line-height:1; }
.fp-close:hover { color:#fff; background:#1e1e1e; }
.fp-body { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
.fp-body::-webkit-scrollbar { display:none; }
.fp-empty { color:#333; font-size:12px; text-align:center; margin-top:40px; }
.fp-card { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:10px; padding:10px 12px; display:flex; align-items:center; gap:10px; }
.fp-card:hover { background:#1f1f1f; }
.fp-ico { width:30px; height:30px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; flex-shrink:0; }
.fp-info { flex:1; min-width:0; }
.fp-name { font-size:12px; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.fp-time { font-size:10px; color:#444; margin-top:2px; }
.fp-acts { display:flex; gap:5px; flex-shrink:0; }
.fp-btn { background:transparent; border:1px solid #2a2a2a; border-radius:6px; color:#666; font-size:10px; padding:3px 7px; cursor:pointer; font-family:'Inter',sans-serif; transition:all .15s; }
.fp-btn:hover { border-color:#444; color:#fff; }

/* ════════════════════════════════════════════════════════════
   ÉDITEUR INTÉGRÉ
   ════════════════════════════════════════════════════════════ */
.editor { display:none; position:fixed; inset:0; background:#0a0a0a; z-index:60; flex-direction:column; }
.editor.open { display:flex; }
.ed-head { padding:12px 16px; border-bottom:1px solid #1e1e1e; display:flex; align-items:center; gap:10px; flex-shrink:0; }
.ed-fname { flex:1; background:transparent; border:none; color:#fff; font-family:'Inter',sans-serif; font-size:13px; font-weight:600; outline:none; min-width:0; }
.ed-fname::placeholder { color:#333; }
.ed-action { background:transparent; border:1px solid #333; border-radius:8px; color:#ccc; font-size:12px; font-weight:500; padding:6px 12px; cursor:pointer; font-family:'Inter',sans-serif; transition:all .15s; white-space:nowrap; }
.ed-action:hover { background:#1e1e1e; }
.ed-action.save { background:#fff; border-color:#fff; color:#000; }
.ed-action.save:hover { background:#e0e0e0; }
.ed-action.cls { border:none; color:var(--dim); font-size:20px; padding:4px 8px; line-height:1; }
.ed-action.cls:hover { color:#fff; background:#1e1e1e; }
.ed-ta { flex:1; background:#0a0a0a; border:none; color:#e0e0e0; font-family:'Courier New',monospace; font-size:13px; line-height:1.7; padding:16px 20px; resize:none; outline:none; overflow-y:auto; tab-size:2; }
.ed-ta::-webkit-scrollbar { width:4px; }
.ed-ta::-webkit-scrollbar-thumb { background:#222; border-radius:2px; }
.ed-status { padding:5px 16px; border-top:1px solid #1a1a1a; display:flex; gap:16px; flex-shrink:0; }
.ed-status span { font-size:10px; color:#333; }
</style>
</head>
<body>
<div class="app">

  <!-- ═══════════════════ HEADER ═══════════════════ -->
  <div class="header">
    <div class="avatar">
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="11" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
        <path d="M8 16L10.5 9L12 13L13.5 9L16 16" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="12" cy="12" r="2" fill="rgba(255,255,255,0.1)"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>AMIN <span class="speaker-badge" id="speakerBadge">· BALDE</span></h1>
      <div class="mode-badge ecrit" id="modeBadge">ÉCRIT</div>
      <div class="voice-indicator" id="voiceInd">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
    <div class="header-right">
      <div class="clock" id="clock">--:--:--</div>
      <div class="weather" id="weather">Dakar --°C</div>
      <button class="stop-btn" id="stopBtn" onclick="stopSpeaking()">⏹ Stop</button>
      <button class="files-btn" id="filesBtn" onclick="toggleFP()">FICHIERS</button>
    </div>
  </div>

  <!-- ═══════════════════ MESSAGES ═══════════════════ -->
  <div class="messages" id="messages"></div>

  <!-- ═══════════════════ TYPING ═══════════════════ -->
  <div class="typing" id="typing">
    <div class="dots"><span></span><span></span><span></span></div>
    <span class="typing-text">AMIN...</span>
  </div>

  <!-- ═══════════════════ INPUT ═══════════════════ -->
  <div class="input-wrap">
    <button class="ibtn mic" id="micBtn" onclick="toggleMic()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v6a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zm-1 14.93A8 8 0 0 1 4 11H2a10 10 0 0 0 9 9.93V23h2v-2.07A10 10 0 0 0 22 11h-2a8 8 0 0 1-7 7.93z"/></svg>
    </button>
    <button class="ibtn" onclick="document.getElementById('fileInput').click()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/></svg>
    </button>
    <input type="file" id="fileInput" accept="*/*" onchange="handleFile(this)">
    <textarea id="input" placeholder="Parle ou écris à AMIN..." rows="1"></textarea>
    <button class="ibtn send" id="sendBtn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- ═══════════════════ DROP OVERLAY ═══════════════════ -->
<div class="drop-overlay" id="dropOverlay">
  <p>📂 Dépose ton fichier ici</p>
  <small>Tous types — code, PDF, Word, Excel, ZIP, images...</small>
</div>

<!-- ═══════════════════ PANNEAU HISTORIQUE ═══════════════════ -->
<div class="fp" id="fp">
  <div class="fp-head">
    <span class="fp-title">FICHIERS</span>
    <button class="fp-close" onclick="toggleFP()">×</button>
  </div>
  <div class="fp-body" id="fpBody">
    <div class="fp-empty" id="fpEmpty">Aucun fichier généré</div>
  </div>
</div>

<!-- ═══════════════════ ÉDITEUR ═══════════════════ -->
<div class="editor" id="editor">
  <div class="ed-head">
    <input class="ed-fname" id="edFname" type="text" placeholder="fichier.py"/>
    <button class="ed-action" onclick="edDownload()">Télécharger</button>
    <button class="ed-action save" onclick="edSave()">Sauvegarder</button>
    <button class="ed-action cls" onclick="closeEditor()">×</button>
  </div>
  <textarea class="ed-ta" id="edTa" spellcheck="false"></textarea>
  <div class="ed-status">
    <span id="edLines">0 lignes</span>
    <span id="edChars">0 car.</span>
    <span id="edExt">—</span>
  </div>
</div>

<script>
'use strict';
// ════════════════════════════════════════════════════════════
// STATE GLOBAL
// ════════════════════════════════════════════════════════════
const SESSION_ID    = 'session_' + Date.now();
const $msg          = document.getElementById('messages');
const $input        = document.getElementById('input');
const $typing       = document.getElementById('typing');
const $sendBtn      = document.getElementById('sendBtn');
const $micBtn       = document.getElementById('micBtn');
const $stopBtn      = document.getElementById('stopBtn');
const $voiceInd     = document.getElementById('voiceInd');
const $modeBadge    = document.getElementById('modeBadge');
const $speakerBadge = document.getElementById('speakerBadge');
const $filesBtn     = document.getElementById('filesBtn');

let chatHistory    = [];
let isLoading      = false;
let recognition    = null;
let wakeActive     = false;
let isSpeaking     = false;
let isWriteMode    = true;
let currentSpeaker = 'BALDE';
let fileHistory    = [];
let editorFile     = null;

// ════════════════════════════════════════════════════════════
// UTILS FICHIERS — classes CSS, labels, MIME
// ════════════════════════════════════════════════════════════
const FC_CLASS = {
  js:'t-js',ts:'t-ts',py:'t-py',html:'t-html',css:'t-css',
  json:'t-json',xml:'t-xml',yaml:'t-yaml',yml:'t-yaml',csv:'t-csv',sql:'t-sql',
  pdf:'t-pdf',xlsx:'t-xlsx',xls:'t-xlsx',docx:'t-docx',doc:'t-docx',
  zip:'t-zip',sh:'t-sh',bat:'t-bat',md:'t-md',txt:'t-txt',
  svg:'t-svg',qr:'t-qr',c:'t-c',cpp:'t-cpp',h:'t-c',java:'t-java'
};
const FC_LABEL = {
  js:'JS',ts:'TS',py:'PY',html:'HTML',css:'CSS',json:'JSON',
  xml:'XML',yaml:'YAML',yml:'YAML',csv:'CSV',sql:'SQL',pdf:'PDF',
  xlsx:'XLS',xls:'XLS',docx:'DOC',doc:'DOC',zip:'ZIP',
  sh:'SH',bat:'BAT',md:'MD',txt:'TXT',svg:'SVG',qr:'QR',
  c:'C',cpp:'C++',h:'C',java:'JAVA'
};
const MIME = {
  txt:'text/plain',md:'text/markdown',html:'text/html',css:'text/css',
  js:'application/javascript',ts:'application/javascript',
  py:'text/x-python',json:'application/json',xml:'application/xml',
  csv:'text/csv',yaml:'text/yaml',sql:'text/plain',sh:'text/x-sh',
  bat:'text/plain',java:'text/x-java',c:'text/x-c',cpp:'text/x-c++',
  pdf:'application/pdf',svg:'image/svg+xml',
  docx:'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
  xlsx:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
  zip:'application/zip'
};
function fcClass(ext){ return FC_CLASS[(ext||'').toLowerCase()]||'t-def'; }
function fcLabel(ext){ const e=(ext||'').toLowerCase(); return FC_LABEL[e]||(ext||'FILE').toUpperCase().slice(0,4); }
function getMime(ext){ return MIME[(ext||'').toLowerCase()]||'application/octet-stream'; }

function safeAtob(str) {
  try { return atob(str); } catch(e) { return str; }
}
function safeBtoa(str) {
  try { return btoa(unescape(encodeURIComponent(str))); } catch(e) { try { return btoa(str); } catch(e2) { return str; } }
}

// ════════════════════════════════════════════════════════════
// TÉLÉCHARGEMENT FICHIERS
// ════════════════════════════════════════════════════════════
function triggerDownload(url, filename) {
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 3000);
}

async function downloadFile(ext, filename, content) {
  const extL = (ext||'').toLowerCase();
  try {
    let blob;
    if (extL === 'qr') {
      // QR → télécharger en PNG
      const canvas = document.createElement('canvas');
      await renderQR(content, canvas, 400);
      canvas.toBlob(b => triggerDownload(URL.createObjectURL(b), filename.replace(/\.qr$/i,'.png')));
      return;
    }
    if (extL === 'pdf') {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const decoded = safeAtob(content);
      doc.setFont('helvetica'); doc.setFontSize(11);
      doc.text(doc.splitTextToSize(decoded, 180), 15, 20);
      blob = doc.output('blob');
    } else if (extL === 'xlsx') {
      const decoded = safeAtob(content);
      const rows = decoded.trim().split('\n').map(r => r.split(','));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), 'Sheet1');
      const out = XLSX.write(wb, { type:'array', bookType:'xlsx' });
      blob = new Blob([out], { type: getMime('xlsx') });
    } else if (extL === 'zip') {
      const s = safeAtob(content);
      const bytes = new Uint8Array(s.length);
      for (let i=0;i<s.length;i++) bytes[i]=s.charCodeAt(i);
      blob = new Blob([bytes], { type:'application/zip' });
    } else {
      blob = new Blob([safeAtob(content)], { type: getMime(extL) });
    }
    triggerDownload(URL.createObjectURL(blob), filename);
  } catch(e) { console.error('Download error:', e); }
}

// ════════════════════════════════════════════════════════════
// QR CODE — API gratuite qrserver.com
// ════════════════════════════════════════════════════════════
function renderQR(text, canvas, size) {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      canvas.width = size; canvas.height = size;
      canvas.getContext('2d').drawImage(img, 0, 0, size, size);
      resolve();
    };
    img.onerror = () => resolve();
    img.src = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(text)}`;
  });
}

// ════════════════════════════════════════════════════════════
// AFFICHAGE CARTES FICHIERS GÉNÉRÉS
// ════════════════════════════════════════════════════════════
function showFileCards(files) {
  if (!files?.length) return;
  const wrap = document.createElement('div');
  wrap.className = 'msg amin';
  wrap.style.gap = '6px';

  files.forEach(f => {
    const ext = (f.ext||'').toLowerCase();

    if (ext === 'qr') {
      // QR affiché directement dans le chat
      const msgDiv = document.createElement('div');
      msgDiv.className = 'msg amin';
      const qrWrap = document.createElement('div');
      qrWrap.className = 'qr-wrap';
      const canvas = document.createElement('canvas');
      const label = document.createElement('div');
      label.className = 'qr-label';
      label.textContent = f.content;
      const dlBtn = document.createElement('button');
      dlBtn.className = 'qr-dl';
      dlBtn.textContent = 'Télécharger PNG';
      dlBtn.onclick = () => downloadFile('qr', f.name, f.content);
      qrWrap.append(canvas, label, dlBtn);
      msgDiv.appendChild(qrWrap);
      $msg.appendChild(msgDiv);
      renderQR(f.content, canvas, 200);

    } else if (ext === 'svg') {
      // SVG prévisualisé inline
      const msgDiv = document.createElement('div');
      msgDiv.className = 'msg amin';
      const svgWrap = document.createElement('div');
      svgWrap.className = 'svg-wrap';
      try {
        const decoded = safeAtob(f.content);
        svgWrap.innerHTML = decoded;
        svgWrap.querySelector('svg')?.setAttribute('style','max-width:100%;height:auto;display:block;');
      } catch(e) { svgWrap.textContent = 'SVG non lisible.'; }
      msgDiv.appendChild(svgWrap);
      $msg.appendChild(msgDiv);
      // + carte téléchargement
      wrap.appendChild(buildCard(f));

    } else {
      wrap.appendChild(buildCard(f));
    }
  });

  if (wrap.children.length) $msg.appendChild(wrap);
  $msg.scrollTop = $msg.scrollHeight;
  addToHistory(files);
}

function buildCard(f) {
  const card = document.createElement('div');
  card.className = 'file-card';
  card.innerHTML = `
    <div class="fc-ico ${fcClass(f.ext)}">${fcLabel(f.ext)}</div>
    <div class="fc-info">
      <div class="fc-name">${escHtml(f.name)}</div>
      <div class="fc-sub">${(f.ext||'').toUpperCase()} · Généré par AMIN</div>
    </div>
    <div class="fc-actions">
      <button class="fc-btn edit-btn">Éditer</button>
      <button class="fc-btn dl">Télécharger</button>
    </div>`;
  card.querySelector('.edit-btn').onclick = () => openEditor(f.ext, f.name, f.content);
  card.querySelector('.dl').onclick = () => downloadFile(f.ext, f.name, f.content);
  return card;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ════════════════════════════════════════════════════════════
// HISTORIQUE FICHIERS
// ════════════════════════════════════════════════════════════
function addToHistory(files) {
  const t = new Date();
  const ts = String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0');
  files.forEach(f => fileHistory.unshift({...f, time: ts}));
  renderFP();
  $filesBtn.classList.add('has');
  $filesBtn.textContent = `FICHIERS (${fileHistory.length})`;
}

function toggleFP() {
  document.getElementById('fp').classList.toggle('open');
}

function renderFP() {
  const body = document.getElementById('fpBody');
  const empty = document.getElementById('fpEmpty');
  body.querySelectorAll('.fp-card').forEach(c => c.remove());
  if (!fileHistory.length) { empty.style.display='block'; return; }
  empty.style.display = 'none';
  fileHistory.forEach((f, i) => {
    const card = document.createElement('div');
    card.className = 'fp-card';
    card.innerHTML = `
      <div class="fp-ico ${fcClass(f.ext)}">${fcLabel(f.ext)}</div>
      <div class="fp-info">
        <div class="fp-name">${escHtml(f.name)}</div>
        <div class="fp-time">${f.time}</div>
      </div>
      <div class="fp-acts">
        <button class="fp-btn" data-i="${i}" data-a="edit">Éditer</button>
        <button class="fp-btn" data-i="${i}" data-a="dl">↓</button>
      </div>`;
    card.querySelectorAll('.fp-btn').forEach(btn => btn.onclick = () => {
      const file = fileHistory[btn.dataset.i];
      btn.dataset.a === 'dl' ? downloadFile(file.ext,file.name,file.content) : openEditor(file.ext,file.name,file.content);
    });
    body.appendChild(card);
  });
}

// IMPORT FICHIERS — tous types (V5 étendu)
// ════════════════════════════════════════════════════════════
function isText(name)     { return /\.(txt|md|html|css|js|ts|mjs|py|java|c|cpp|h|json|xml|yaml|yml|csv|sql|sh|bat|ps1|dockerfile|gitignore|env|ini|cfg|conf|log|rs|go|rb|php|swift|kt|r|m|lua|dart)$/i.test(name); }
function isUploadable(name){ return /\.(pdf|docx|doc|xlsx|xls|pptx|ppt|jpg|jpeg|png|webp|gif)$/i.test(name); }

async function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 20*1024*1024) { addMsg('assistant','Fichier trop lourd. Max 20MB.'); input.value=''; return; }

  const question = $input.value.trim() || 'Analyse ce fichier et dis-moi ce que c\'est.';
  $input.value = '';

  // Bulle fichier importé
  const div = document.createElement('div');
  div.className = 'msg user';
  const fb = document.createElement('div');
  fb.className = 'file-bubble';
  fb.innerHTML = `<div class="fc-ico ${fcClass(file.name.split('.').pop())}" style="width:24px;height:24px;font-size:8px;border-radius:4px;flex-shrink:0;">${fcLabel(file.name.split('.').pop())}</div><span class="fb-name">${escHtml(file.name)}</span><span class="fb-size">${(file.size/1024).toFixed(0)}KB</span>`;
  div.appendChild(fb);
  $msg.appendChild(div);
  $msg.scrollTop = $msg.scrollHeight;

  isLoading = true; $sendBtn.disabled = true; $typing.classList.add('active');

  try {
    let reply = '';

    if (isText(file.name)) {
      // Lire comme texte → envoyer dans le chat
      const text = await file.text();
      const trunc = text.length > 8000 ? text.slice(0,8000)+'\n\n[... tronqué ...]' : text;
      const userMsg = `[Fichier: ${file.name}]\n\`\`\`\n${trunc}\n\`\`\`\n\n${question}`;
      chatHistory.push({ role:'user', content:userMsg });
      const data = await callChat();
      reply = data.reply || 'Analysé.';
      if (data.files?.length) showFileCards(data.files);

    } else if (file.name.toLowerCase().endsWith('.zip')) {
      // Décompresser et analyser
      const buf  = await file.arrayBuffer();
      const zip  = await JSZip.loadAsync(buf);
      const names = Object.keys(zip.files).filter(n => !zip.files[n].dir);
      let info = `ZIP: ${file.name} — ${names.length} fichiers:\n${names.join('\n')}`;
      for (const tf of names.filter(n => isText(n)).slice(0,3)) {
        const c = await zip.files[tf].async('string');
        info += `\n\n--- ${tf} ---\n${c.slice(0,2000)}`;
      }
      chatHistory.push({ role:'user', content:`[ZIP: ${file.name}]\n${info}\n\n${question}` });
      const data = await callChat();
      reply = data.reply || 'ZIP analysé.';
      if (data.files?.length) showFileCards(data.files);

    } else if (isUploadable(file.name)) {
      // Envoyer à /api/upload (PDF, images, Office)
      const b64 = await new Promise(r => { const fr=new FileReader(); fr.onload=e=>r(e.target.result.split(',')[1]); fr.readAsDataURL(file); });
      const res = await fetch('/api/upload', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ file:b64, filename:file.name, question, speaker:currentSpeaker, datetime:new Date().toLocaleString() }) });
      const data = await res.json();
      reply = data.reply || 'Fichier analysé.';

    } else {
      reply = `Fichier reçu : **${file.name}** (${(file.size/1024).toFixed(0)}KB). Ce type n'est pas lisible directement. Dis-moi ce que tu veux faire avec.`;
    }

    $typing.classList.remove('active');
    addMsg('assistant', reply);
    chatHistory.push({ role:'assistant', content:reply });
    if (!isWriteMode) speakText(reply);

  } catch(e) {
    $typing.classList.remove('active');
    addMsg('assistant', 'Erreur lecture fichier.');
  }
  isLoading=false; $sendBtn.disabled=false; input.value='';
}

// SYNTHÈSE VOCALE (V2)
// ════════════════════════════════════════════════════════════
window.speechSynthesis.getVoices();
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

function getMaleVoice() {
  const v=window.speechSynthesis.getVoices();
  const male=['thomas','paul','nicolas','guillaume','jean','pierre','henri','claude','luca','reed','aaron','arthur'];
  const female=['amelie','camille','marie','lucie','alice','julie','victoria','sophie','emma','lea'];
  return v.find(x=>x.lang.startsWith('fr')&&male.some(n=>x.name.toLowerCase().includes(n)))
      || v.find(x=>x.lang.startsWith('fr')&&!female.some(n=>x.name.toLowerCase().includes(n)))
      || v.find(x=>x.lang.startsWith('fr'));
}

function cleanTTS(t) {
  return t.replace(/[\u{1F000}-\u{1FFFF}]/gu,'').replace(/[\u{2600}-\u{27BF}]/gu,'')
    .replace(/\*\*/g,'').replace(/\*/g,'').replace(/#{1,6}\s/g,'')
    .replace(/\[BGCOLOR:[^\]]*\]/g,'').replace(/[-•]/g,',').trim();
}

function stopSpeaking() {
  window.speechSynthesis.cancel(); isSpeaking=false;
  $stopBtn.classList.remove('active'); $voiceInd.classList.remove('active');
}

function speakText(text) {
  if (isWriteMode) return;
  stopSpeaking();
  const clean=cleanTTS(text); if(!clean) return;
  const u=new SpeechSynthesisUtterance(clean);
  u.lang='fr-FR'; u.rate=1.0; u.pitch=0.8; u.volume=1;
  const voice=getMaleVoice(); if(voice) u.voice=voice;
  u.onstart=()=>{isSpeaking=true;$stopBtn.classList.add('active');$voiceInd.classList.add('active');};
  u.onend=u.onerror=()=>{isSpeaking=false;$stopBtn.classList.remove('active');$voiceInd.classList.remove('active');};
  window.speechSynthesis.speak(u);
}

// ════════════════════════════════════════════════════════════
// WAKE WORD & MIC (V2)
// ════════════════════════════════════════════════════════════
function startWakeWord() {
  if (!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)) return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang='fr-FR'; recognition.continuous=true;
  recognition.interimResults=true; recognition.maxAlternatives=3;
  recognition.onresult=e=>{
    for(let i=e.resultIndex;i<e.results.length;i++){
      const alts=Array.from({length:e.results[i].length},(_,j)=>e.results[i][j].transcript.toLowerCase().trim()).join(' ');
      if(!wakeActive){
        if(/am[iîe]n|amino|hamid|aming/i.test(alts)){wakeActive=true;stopSpeaking();$micBtn.classList.add('on');$input.value='';}
      } else {
        const txt=e.results[i][0].transcript.trim();
        if(e.results[i].isFinal&&txt&&!/am[iîe]n/i.test(txt)){$input.value=txt;wakeActive=false;$micBtn.classList.remove('on');sendMessage();}
      }
    }
  };
  recognition.onend=()=>{wakeActive=false;$micBtn.classList.remove('on');setTimeout(()=>{try{recognition.start();}catch(e){}},300);};
  recognition.onerror=e=>{if(e.error!=='aborted'&&e.error!=='no-speech'){wakeActive=false;$micBtn.classList.remove('on');setTimeout(()=>{try{recognition.start();}catch(e){}},800);}};
  try{recognition.start();}catch(e){}
}

function toggleMic() {
  if(!recognition)return;
  if($micBtn.classList.contains('on')){wakeActive=false;$micBtn.classList.remove('on');}
  else{stopSpeaking();wakeActive=true;$micBtn.classList.add('on');}
}

function addMsg(role, text) {
  const div=document.createElement('div');

function changeBg(color) {
  document.body.style.background=color;
  const tmp=document.createElement('div');tmp.style.color=color;document.body.appendChild(tmp);
  const rgb=getComputedStyle(tmp).color;document.body.removeChild(tmp);
  const m=rgb.match(/\d+/g);
  if(m){const b=(+m[0]*299+ +m[1]*587+ +m[2]*114)/1000;document.documentElement.style.setProperty('--text',b>128?'#000':'#fff');document.documentElement.style.setProperty('--dim',b>128?'#444':'#555');}
}

async function callChat() {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages:chatHistory, session_id:SESSION_ID, speaker:currentSpeaker, datetime:new Date().toLocaleString() })

}

// ════════════════════════════════════════════════════════════
// SEND MESSAGE
// ════════════════════════════════════════════════════════════
async function sendMessage() {
  const text=$input.value.trim();
  if(!text||isLoading)return;
  $input.value=''; $input.style.height='auto';
  isLoading=true; $sendBtn.disabled=true; stopSpeaking();

  // Détecter speaker / mode
  if(/ici\s+balde/i.test(text)) setSpeaker('BALDE');
  else if(/ici\s+nasser/i.test(text)) setSpeaker('NASSER');
  if(/mode.*(écri|ecri|texte)/i.test(text)) setMode(true);
  else if(/mode.*(voc|oral|parle|speak)/i.test(text)) setMode(false);

  addMsg('user',text);
  chatHistory.push({role:'user',content:text});
  $typing.classList.add('active');
  $msg.scrollTop=$msg.scrollHeight;

  try {
    const data = await callChat();
    let reply = data.reply || 'Je suis là.';

    // Screenshot PC (V4)
    if(data.screenshot){
      const sdiv=document.createElement('div');sdiv.className='msg amin';
      const img=document.createElement('img');img.className='pc-shot';
      img.src='data:image/png;base64,'+data.screenshot;
      sdiv.appendChild(img);$msg.appendChild(sdiv);$msg.scrollTop=$msg.scrollHeight;
    }

    // Couleur fond
    const bgm=reply.match(/\[BGCOLOR:(#[a-fA-F0-9]{3,6}|[a-z]+)\]/i);
    if(bgm) changeBg(bgm[1]);

    $typing.classList.remove('active');
    addMsg('assistant',reply);

    // Fichiers générés
    if(data.files?.length) showFileCards(data.files);

    chatHistory.push({role:'assistant',content:reply});
    if(!isWriteMode) speakText(reply);

  } catch(err) {
    $typing.classList.remove('active');
    addMsg('assistant','Problème de connexion. Réessaie.');
  }
  isLoading=false; $sendBtn.disabled=false;
}

// ════════════════════════════════════════════════════════════
// INPUT AUTO-RESIZE
// ════════════════════════════════════════════════════════════
$input.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';});
$input.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});

// ════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════
window.addEventListener('load',()=>{
  window.speechSynthesis.getVoices();
  startWakeWord();
  setTimeout(()=>{
    const msgs=['Yo. Je suis là. Dis-moi.','AMIN connecté. Quoi de neuf ?','Présent. C\'est quoi le programme ?','Je t\'écoute. Lance-toi.','Connecté. Qu\'est-ce qu\'on fait ?','Prêt. Parle-moi.'];
    const w=msgs[Math.floor(Math.random()*msgs.length)];
    addMsg('assistant',w);
    chatHistory.push({role:'assistant',content:w});
    speakText(w);
  },400);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>AMIN</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<!-- Librairies génération fichiers -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root { --bg: #000; --surface: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.08); --text: #fff; --text-dim: #555; }
  html { height: 100%; }
  body { height: 100%; height: 100dvh; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; transition: background 1s ease; }
  .app { display: flex; flex-direction: column; height: 100dvh; }
  .header { padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); }
  .avatar { width: 42px; height: 42px; border-radius: 50%; background: #111; border: 1px solid rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .avatar svg { width: 22px; height: 22px; }
  .header-text h1 { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: 2px; }
  .header-text p { font-size: 10px; color: #555; margin-top: 1px; }
  .mode-badge { display: inline-block; font-size: 9px; padding: 2px 6px; border-radius: 4px; margin-top: 2px; font-weight: 600; letter-spacing: 1px; }
  .mode-badge.vocal { background: rgba(255,255,255,0.08); color: #888; }
  .mode-badge.ecrit { background: rgba(255,255,255,0.15); color: #fff; }
  .speaker-badge { font-size: 9px; color: #555; margin-left: 6px; letter-spacing: 1px; }
  .voice-indicator { display: none; align-items: center; gap: 2px; height: 14px; margin-top: 3px; }
  .voice-indicator.active { display: flex; }
  .voice-indicator span { width: 2px; background: #fff; border-radius: 2px; animation: wave 1s infinite ease-in-out; }
  .voice-indicator span:nth-child(1) { height: 4px; animation-delay: 0s; }
  .voice-indicator span:nth-child(2) { height: 10px; animation-delay: 0.15s; }
  .voice-indicator span:nth-child(3) { height: 6px; animation-delay: 0.3s; }
  .voice-indicator span:nth-child(4) { height: 12px; animation-delay: 0.45s; }
  .voice-indicator span:nth-child(5) { height: 4px; animation-delay: 0.6s; }
  @keyframes wave { 0%, 100% { transform: scaleY(1); opacity: 0.4; } 50% { transform: scaleY(1.8); opacity: 1; } }
  .header-right { margin-left: auto; text-align: right; flex-shrink: 0; }
  .clock { font-size: 14px; font-weight: 600; color: #fff; letter-spacing: 1px; }
  .weather { font-size: 10px; color: #555; margin-top: 2px; }
  .stop-btn { background: transparent; border: 1px solid #222; border-radius: 6px; color: #555; font-size: 10px; padding: 3px 8px; cursor: pointer; display: none; margin-top: 4px; }
  .stop-btn.active { display: block; color: #fff; border-color: #444; }
  .messages { flex: 1; overflow-y: scroll; -webkit-overflow-scrolling: touch; padding: 20px 16px; display: flex; flex-direction: column; gap: 10px; }
  .messages::-webkit-scrollbar { display: none; }
  .msg { display: flex; flex-direction: column; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-items: flex-end; }
  .msg.amin { align-items: flex-start; }
  .msg-bubble { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.55; word-break: break-word; }
  .msg-bubble p { margin: 0 0 6px 0; }
  .msg-bubble ul, .msg-bubble ol { padding-left: 16px; margin: 4px 0; }
  .msg-bubble code { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  .msg-bubble pre { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px; overflow-x: auto; margin: 6px 0; }
  .msg-bubble pre code { background: none; padding: 0; font-size: 12px; }
  .msg.amin .msg-bubble { background: rgba(255,255,255,0.04); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.07); }
  .msg.user .msg-bubble { background: rgba(255,255,255,0.07); color: var(--text); border-bottom-right-radius: 4px; border: 1px solid rgba(255,255,255,0.1); white-space: pre-wrap; }

  /* Bubble fichier importé */
  .file-bubble { max-width: 85%; padding: 8px 12px; border-radius: 10px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); font-size: 12px; color: #888; display: flex; align-items: center; gap: 8px; }
  .file-bubble span { color: #fff; font-size: 13px; }

  /* Carte de téléchargement fichier généré — style Claude */
  .file-card { max-width: 85%; margin-top: 4px; padding: 12px 14px; border-radius: 12px; background: #1a1a1a; border: 1px solid #2a2a2a; display: flex; align-items: center; gap: 12px; }
  .file-card-icon { width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; font-weight: 700; letter-spacing: 0.5px; }
  .file-card-icon.type-js   { background: #2a2000; color: #f7df1e; }
  .file-card-icon.type-py   { background: #001a2a; color: #4b8bbe; }
  .file-card-icon.type-html { background: #2a0f00; color: #e34c26; }
  .file-card-icon.type-css  { background: #00102a; color: #264de4; }
  .file-card-icon.type-json { background: #1a1a00; color: #cbcb41; }
  .file-card-icon.type-pdf  { background: #2a0000; color: #ff4444; }
  .file-card-icon.type-xlsx { background: #002a00; color: #1d6f42; }
  .file-card-icon.type-docx { background: #00102a; color: #2b579a; }
  .file-card-icon.type-zip  { background: #1a1200; color: #f5a623; }
  .file-card-icon.type-md   { background: #1a1a1a; color: #aaa; }
  .file-card-icon.type-txt  { background: #1a1a1a; color: #aaa; }
  .file-card-icon.type-sh   { background: #001a00; color: #4ec94e; }
  .file-card-icon.type-default { background: #1e1e1e; color: #888; }
  .file-card-info { flex: 1; min-width: 0; }
  .file-card-name { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-card-ext { font-size: 11px; color: #555; margin-top: 2px; }
  .file-card-btn { flex-shrink: 0; background: transparent; border: 1px solid #333; border-radius: 8px; color: #ccc; font-size: 12px; font-weight: 500; padding: 6px 14px; cursor: pointer; transition: all 0.15s; white-space: nowrap; font-family: 'Inter', sans-serif; }
  .file-card-btn:hover { background: #222; border-color: #444; color: #fff; }
  .file-card-btn:active { transform: scale(0.96); }

  /* Drop zone overlay */
  .drop-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 12px; border: 2px dashed rgba(255,255,255,0.3); }
  .drop-overlay.active { display: flex; }
  .drop-overlay p { color: #fff; font-size: 16px; font-weight: 600; letter-spacing: 1px; }
  .drop-overlay small { color: #555; font-size: 11px; }

  .typing { display: none; align-items: center; gap: 6px; padding: 0 16px 8px; flex-shrink: 0; }
  .typing.active { display: flex; }
  .typing-text { font-size: 11px; color: var(--text-dim); }
  .dots { display: flex; gap: 3px; }
  .dots span { width: 4px; height: 4px; background: #fff; border-radius: 50%; animation: dot 1.2s infinite; opacity: 0.3; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }
  .input-wrap { padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom)); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); }
  textarea { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 10px 14px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; resize: none; outline: none; min-height: 42px; max-height: 100px; line-height: 1.5; transition: border-color 0.2s; }
  textarea::placeholder { color: var(--text-dim); }
  textarea:focus { border-color: rgba(255,255,255,0.15); }
  .send { width: 42px; height: 42px; background: #fff; border: none; border-radius: 12px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s, transform 0.1s; }
  .send:active { transform: scale(0.93); }
  .send:disabled { opacity: 0.3; cursor: not-allowed; }
  .send svg { fill: #000; }
  .mic-btn { width: 42px; height: 42px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .mic-btn.listening { background: #ff3b30; border-color: #ff3b30; }
  .mic-btn svg { fill: #fff; }
  .upload-btn { width: 42px; height: 42px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .upload-btn:active { opacity: 0.7; }
  .upload-btn svg { fill: #fff; }
  #fileInput { display: none; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="avatar">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="11" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
        <path d="M8 16L10.5 9L12 13L13.5 9L16 16" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="12" cy="12" r="2" fill="rgba(255,255,255,0.1)"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>AMIN <span class="speaker-badge" id="speakerBadge">· BALDE</span></h1>
      <div class="mode-badge ecrit" id="modeBadge">ÉCRIT</div>
      <div class="voice-indicator" id="voiceIndicator">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
    <div class="header-right">
      <div class="clock" id="clock">--:--:--</div>
      <div class="weather" id="weather">Dakar --°C</div>

    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="typing" id="typing">
    <div class="dots"><span></span><span></span><span></span></div>
    <span class="typing-text">AMIN...</span>
  </div>
  <div class="input-wrap">
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v6a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zm-1 14.93A8 8 0 0 1 4 11H2a10 10 0 0 0 9 9.93V23h2v-2.07A10 10 0 0 0 22 11h-2a8 8 0 0 1-7 7.93z"/></svg>
    </button>
    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/></svg>
    </button>
    <!-- Accept TOUS les types de fichiers -->
    <input type="file" id="fileInput" accept="*/*" onchange="handleFile(this)">
    <textarea id="input" placeholder="Parle ou écris à AMIN..." rows="1"></textarea>
    <button class="send" id="sendBtn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- Drop overlay -->
<div class="drop-overlay" id="dropOverlay">
  <p>📂 Dépose ton fichier ici</p>
  <small>Tous types acceptés — code, PDF, Word, Excel, ZIP, images...</small>
</div>

<script>
const SESSION_ID = 'session_' + Date.now();
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const typingEl = document.getElementById('typing');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');
const stopBtn = document.getElementById('stopBtn');
const voiceIndicator = document.getElementById('voiceIndicator');
const modeBadge = document.getElementById('modeBadge');
const speakerBadge = document.getElementById('speakerBadge');
let history = [];
let isLoading = false;
let recognition = null;
let wakeActive = false;
let isSpeaking = false;
let isWriteMode = true;
let currentSpeaker = 'BALDE';

// ============================================================
// UTILITAIRES FICHIERS
// ============================================================

// Icônes par type de fichier
function fileIcon(ext) {
  const icons = {
    py: '🐍', js: '📜', ts: '📘', html: '🌐', css: '🎨',
    json: '📋', xml: '📋', yaml: '📋', csv: '📊', sql: '🗄️',
    txt: '📄', md: '📝', sh: '⚙️', bat: '⚙️',
    pdf: '📕', docx: '📘', xlsx: '📗', pptx: '📙',
    zip: '📦', java: '☕', c: '🔧', cpp: '🔧',
    dockerfile: '🐳', gitignore: '🔒',
    png: '🖼️', jpg: '🖼️', jpeg: '🖼️', gif: '🖼️', webp: '🖼️',
    mp3: '🎵', mp4: '🎬', wav: '🎵'
  };
  return icons[ext.toLowerCase()] || '📄';
}

// Détecter le type MIME
function getMime(ext) {
  const mimes = {
    txt: 'text/plain', md: 'text/markdown', html: 'text/html',
    css: 'text/css', js: 'application/javascript', py: 'text/x-python',
    json: 'application/json', xml: 'application/xml', csv: 'text/csv',
    yaml: 'text/yaml', sql: 'text/plain', sh: 'text/x-sh',
    bat: 'text/plain', java: 'text/x-java', c: 'text/x-c',
    cpp: 'text/x-c++', pdf: 'application/pdf',
    docx: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
    xlsx: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
    pptx: 'application/vnd.openxmlformats-officedocument.presentationml.presentation',
    zip: 'application/zip'
  };
  return mimes[ext.toLowerCase()] || 'application/octet-stream';
}

// Télécharger un fichier généré par AMIN
async function downloadFile(ext, filename, content) {
  try {
    let blob;
    const extLow = ext.toLowerCase();

    if (extLow === 'pdf') {
      // Générer PDF avec jsPDF
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const lines = doc.splitTextToSize(atob(content), 180);
      doc.setFont('helvetica');
      doc.setFontSize(11);
      doc.text(lines, 15, 20);
      blob = doc.output('blob');

    } else if (extLow === 'xlsx') {
      // Générer Excel avec SheetJS
      const decoded = atob(content);
      const rows = decoded.split('\n').map(r => r.split(','));
      const ws = XLSX.utils.aoa_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
      const out = XLSX.write(wb, { type: 'array', bookType: 'xlsx' });
      blob = new Blob([out], { type: getMime('xlsx') });

    } else if (extLow === 'zip') {
      // Déjà un zip base64
      const binaryStr = atob(content);
      const bytes = new Uint8Array(binaryStr.length);
      for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
      blob = new Blob([bytes], { type: 'application/zip' });

    } else if (extLow === 'docx') {
      // Pour docx : on génère un fichier .txt avec le contenu markdown (vraie génération docx nécessite serveur)
      // On télécharge en .txt pour l'instant, préfixé
      const decoded = atob(content);
      blob = new Blob([decoded], { type: 'text/plain' });
      filename = filename.replace('.docx', '.txt');

    } else {
      // Fichiers texte/code : décode base64
      let decoded;
      try {
        decoded = atob(content);
      } catch(e) {
        decoded = content; // contenu brut si pas base64
      }
      blob = new Blob([decoded], { type: getMime(extLow) });
    }

    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  } catch(e) {
    console.error('Download error:', e);
  }
}

// Classe couleur par extension
function fileColorClass(ext) {
  const map = { js:'type-js', ts:'type-js', py:'type-py', html:'type-html', css:'type-css',
    json:'type-json', yaml:'type-json', xml:'type-json', pdf:'type-pdf',
    xlsx:'type-xlsx', csv:'type-xlsx', docx:'type-docx', zip:'type-zip',
    md:'type-md', txt:'type-txt', sh:'type-sh', bat:'type-sh' };
  return map[ext.toLowerCase()] || 'type-default';
}

// Label court pour l'icône
function fileLabel(ext) {
  const labels = { js:'JS', ts:'TS', py:'PY', html:'HTML', css:'CSS', json:'JSON',
    yaml:'YAML', xml:'XML', pdf:'PDF', xlsx:'XLS', csv:'CSV', docx:'DOC',
    zip:'ZIP', md:'MD', txt:'TXT', sh:'SH', bat:'BAT', sql:'SQL',
    java:'JAVA', c:'C', cpp:'C++' };
  return labels[ext.toLowerCase()] || ext.toUpperCase().slice(0,4);
}

// Afficher les cartes de fichiers générés — style Claude
function showFileCards(files) {
  if (!files || !files.length) return;
  const container = document.createElement('div');
  container.className = 'msg amin';
  container.style.gap = '6px';
  files.forEach(f => {
    const card = document.createElement('div');
    card.className = 'file-card';
    // Stocker le contenu dans un data attribute pour éviter les problèmes d'échappement
    card.dataset.ext = f.ext;
    card.dataset.name = f.name;
    card.dataset.content = f.content;
    card.innerHTML = `
      <div class="file-card-icon ${fileColorClass(f.ext)}">${fileLabel(f.ext)}</div>
      <div class="file-card-info">
        <div class="file-card-name">${f.name}</div>
        <div class="file-card-ext">${f.ext.toUpperCase()} · Code</div>
      </div>
      <button class="file-card-btn">Télécharger</button>
    `;
    card.querySelector('.file-card-btn').addEventListener('click', () => {
      downloadFile(card.dataset.ext, card.dataset.name, card.dataset.content);
    });
    container.appendChild(card);
  });
  messagesEl.appendChild(container);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ============================================================
// IMPORT DE FICHIERS — tous types
// ============================================================

// Lire le contenu textuel d'un fichier
function readFileAsText(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = () => reject(new Error('Read failed'));
    reader.readAsText(file);
  });
}

function readFileAsBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result.split(',')[1]);
    reader.onerror = () => reject(new Error('Read failed'));
    reader.readAsDataURL(file);
  });
}

// Détecter si le fichier est lisible comme texte
function isTextFile(filename) {
  const textExts = ['txt','md','html','css','js','ts','py','java','c','cpp','h',
    'json','xml','yaml','yml','csv','sql','sh','bat','dockerfile','gitignore',
    'env','ini','cfg','conf','log','rs','go','rb','php','swift','kt'];
  const ext = filename.split('.').pop().toLowerCase();
  return textExts.includes(ext);
}

// Détecter si le fichier est une image
function isImageFile(filename) {
  const imgExts = ['png','jpg','jpeg','webp','gif','bmp','svg'];
  const ext = filename.split('.').pop().toLowerCase();
  return imgExts.includes(ext);
}

// Détecter si c'est un fichier binaire analysable via /api/upload
function isUploadableFile(filename) {
  const uploadExts = ['pdf','docx','xlsx','pptx','jpg','jpeg','png','webp','gif'];
  const ext = filename.split('.').pop().toLowerCase();
  return uploadExts.includes(ext);
}

async function handleFile(input) {
  const file = input.files[0];
  if (!file) return;

  const maxSize = 20 * 1024 * 1024; // 20MB
  if (file.size > maxSize) {
    addMessage('assistant', 'Fichier trop lourd. Max 20MB.');
    input.value = '';
    return;
  }

  const question = inputEl.value.trim() || 'Analyse ce fichier et dis-moi ce que c\'est.';
  inputEl.value = '';

  // Afficher la bulle fichier importé
  const div = document.createElement('div');
  div.className = 'msg user';
  const bubble = document.createElement('div');
  bubble.className = 'file-bubble';
  bubble.innerHTML = `${fileIcon(file.name.split('.').pop())} <span>${file.name}</span> <small style="color:#444;font-size:10px">${(file.size/1024).toFixed(0)}KB</small>`;
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  isLoading = true;
  sendBtn.disabled = true;
  typingEl.classList.add('active');

  try {
    let reply = '';

    if (isTextFile(file.name)) {
      // Lire comme texte et envoyer directement à AMIN via chat
      const content = await readFileAsText(file);
      const truncated = content.length > 8000 ? content.slice(0, 8000) + '\n\n[... tronqué ...]' : content;
      const userMsg = `[Fichier: ${file.name}]\n\`\`\`\n${truncated}\n\`\`\`\n\n${question}`;
      history.push({ role: 'user', content: userMsg });
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, session_id: SESSION_ID, speaker: currentSpeaker, datetime: new Date().toLocaleString() })
      });
      const data = await res.json();
      reply = data.reply || 'Fichier analysé.';
      if (data.files?.length) showFileCards(data.files);

    } else if (file.name.endsWith('.zip')) {
      // Décompresser et lister le contenu
      const base64 = await readFileAsBase64(file);
      const binaryStr = atob(base64);
      const bytes = new Uint8Array(binaryStr.length);
      for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
      const zip = await JSZip.loadAsync(bytes);
      const fileList = Object.keys(zip.files).filter(n => !zip.files[n].dir);
      let zipContent = `Archive ZIP: ${file.name}\n${fileList.length} fichiers:\n${fileList.join('\n')}`;
      // Lire les fichiers texte dans le zip
      const textFiles = fileList.filter(n => isTextFile(n)).slice(0, 3);
      for (const tf of textFiles) {
        const content = await zip.files[tf].async('string');
        const trunc = content.length > 2000 ? content.slice(0, 2000) + '...' : content;
        zipContent += `\n\n--- ${tf} ---\n${trunc}`;
      }
      const userMsg = `[ZIP: ${file.name}]\n${zipContent}\n\n${question}`;
      history.push({ role: 'user', content: userMsg });
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, session_id: SESSION_ID, speaker: currentSpeaker, datetime: new Date().toLocaleString() })
      });
      const data = await res.json();
      reply = data.reply || 'ZIP analysé.';
      if (data.files?.length) showFileCards(data.files);

    } else if (isUploadableFile(file.name)) {
      // Envoyer à /api/upload (PDF, images, docx, xlsx)
      const base64 = await readFileAsBase64(file);
      const res = await fetch('/api/upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ file: base64, filename: file.name, question, speaker: currentSpeaker, datetime: new Date().toLocaleString() })
      });
      const data = await res.json();
      reply = data.reply || 'Fichier analysé.';

    } else {
      // Fichier non reconnu : info générale
      reply = `Fichier reçu : **${file.name}** (${(file.size/1024).toFixed(0)}KB). Ce type de fichier ne peut pas être lu directement. Dis-moi ce que tu veux faire avec.`;
    }

    typingEl.classList.remove('active');
    addMessage('assistant', reply);
    history.push({ role: 'assistant', content: reply });
    if (!isWriteMode) speakText(reply);

  } catch(err) {
    typingEl.classList.remove('active');
    addMessage('assistant', 'Erreur lecture fichier.');
  }

  isLoading = false;
  sendBtn.disabled = false;
  input.value = '';
}

// ============================================================
// DRAG & DROP
// ============================================================
document.addEventListener('dragover', e => { e.preventDefault(); document.getElementById('dropOverlay').classList.add('active'); });
document.addEventListener('dragleave', e => { if (!e.relatedTarget) document.getElementById('dropOverlay').classList.remove('active'); });
document.addEventListener('drop', e => {
  e.preventDefault();
  document.getElementById('dropOverlay').classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (file) {
    const dt = new DataTransfer();
    dt.items.add(file);
    document.getElementById('fileInput').files = dt.files;
    handleFile(document.getElementById('fileInput'));
  }
});

// ============================================================
// UI DE BASE
// ============================================================
function setSpeaker(name) { currentSpeaker = name; speakerBadge.textContent = '· ' + name; }
function setMode(write) {
  isWriteMode = write;
  modeBadge.textContent = write ? 'ÉCRIT' : 'VOCAL';
  modeBadge.className = 'mode-badge ' + (write ? 'ecrit' : 'vocal');
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0') + ':' +
    String(now.getSeconds()).padStart(2,'0');
}
setInterval(updateClock, 1000); updateClock();

async function loadWeather() {
  try {
    const res = await fetch('/api/weather');
    const data = await res.json();
    if (data.temp) document.getElementById('weather').textContent = 'Dakar ' + Math.round(data.temp) + '°C ' + data.desc;
  } catch(e) {}
}
loadWeather(); setInterval(loadWeather, 600000);

window.speechSynthesis.getVoices();
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

function getMaleVoice() {
  const voices = window.speechSynthesis.getVoices();
  const maleNames = ['thomas','paul','nicolas','guillaume','jean','pierre','henri','claude','luca','reed','aaron','arthur'];
  const femaleNames = ['amelie','camille','marie','lucie','alice','julie','victoria','sophie','emma','lea'];
  let voice = voices.find(v => v.lang.startsWith('fr') && maleNames.some(n => v.name.toLowerCase().includes(n)));
  if (!voice) voice = voices.find(v => v.lang.startsWith('fr') && !femaleNames.some(n => v.name.toLowerCase().includes(n)));
  if (!voice) voice = voices.find(v => v.lang.startsWith('fr'));
  return voice;
}

function cleanText(text) {
  return text.replace(/[\u{1F000}-\u{1FFFF}]/gu,'').replace(/[\u{2600}-\u{27BF}]/gu,'')
    .replace(/\*\*/g,'').replace(/\*/g,'').replace(/#{1,6}\s/g,'')
    .replace(/\[BGCOLOR:[^\]]*\]/g,'').replace(/[-•]/g,',').trim();
}

function stopSpeaking() {
  window.speechSynthesis.cancel(); isSpeaking = false;
  stopBtn.classList.remove('active'); voiceIndicator.classList.remove('active');
}

function speakText(text) {
  if (isWriteMode) return;
  stopSpeaking();
  const clean = cleanText(text);
  if (!clean) return;
  const utter = new SpeechSynthesisUtterance(clean);
  utter.lang = 'fr-FR'; utter.rate = 1.0; utter.pitch = 0.8; utter.volume = 1;
  const voice = getMaleVoice();
  if (voice) utter.voice = voice;
  utter.onstart = () => { isSpeaking = true; stopBtn.classList.add('active'); voiceIndicator.classList.add('active'); };
  utter.onend = () => { isSpeaking = false; stopBtn.classList.remove('active'); voiceIndicator.classList.remove('active'); };
  utter.onerror = () => { isSpeaking = false; stopBtn.classList.remove('active'); voiceIndicator.classList.remove('active'); };
  window.speechSynthesis.speak(utter);
}

function startWakeWord() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'fr-FR'; recognition.continuous = true;
  recognition.interimResults = true; recognition.maxAlternatives = 3;
  recognition.onresult = (e) => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const alts = Array.from({length: e.results[i].length}, (_,j) => e.results[i][j].transcript.toLowerCase().trim());
      const anyText = alts.join(' ');
      if (!wakeActive) {
        if (/am[iîe]n|amino|hamid|aming/i.test(anyText)) {
          wakeActive = true; stopSpeaking(); micBtn.classList.add('listening'); inputEl.value = '';
        }
      } else {
        const txt = e.results[i][0].transcript.trim();
        if (e.results[i].isFinal && txt && !/am[iîe]n/i.test(txt)) {
          inputEl.value = txt; wakeActive = false; micBtn.classList.remove('listening'); sendMessage();
        }
      }
    }
  };
  recognition.onend = () => {
    wakeActive = false; micBtn.classList.remove('listening');
    setTimeout(() => { try { recognition.start(); } catch(e) {} }, 300);
  };
  recognition.onerror = (e) => {
    if (e.error !== 'aborted' && e.error !== 'no-speech') {
      wakeActive = false; micBtn.classList.remove('listening');
      setTimeout(() => { try { recognition.start(); } catch(err) {} }, 800);
    }
  };
  try { recognition.start(); } catch(e) {}
}

function toggleMic() {
  if (!recognition) return;
  if (micBtn.classList.contains('listening')) { wakeActive = false; micBtn.classList.remove('listening'); }
  else { stopSpeaking(); wakeActive = true; micBtn.classList.add('listening'); }
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'assistant' ? 'amin' : 'user');
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (role === 'assistant') {
    const clean = text.replace(/\[BGCOLOR:[^\]]*\]/g,'').trim();
    bubble.innerHTML = marked.parse(clean);
  } else {
    bubble.textContent = text;
  }
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function changeBg(color) {
  document.body.style.transition = 'background 1s ease';
  document.body.style.background = color;
  const temp = document.createElement('div');
  temp.style.color = color; document.body.appendChild(temp);
  const rgb = getComputedStyle(temp).color; document.body.removeChild(temp);
  const match = rgb.match(/\d+/g);
  if (match) {
    const brightness = (parseInt(match[0])*299 + parseInt(match[1])*587 + parseInt(match[2])*114) / 1000;
    const textColor = brightness > 128 ? '#000' : '#fff';
    document.documentElement.style.setProperty('--text', textColor);
    document.documentElement.style.setProperty('--text-dim', brightness > 128 ? '#444' : '#555');
  }
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;
  inputEl.value = ''; inputEl.style.height = 'auto';
  isLoading = true; sendBtn.disabled = true; stopSpeaking();

  if (/ici\s+balde/i.test(text)) setSpeaker('BALDE');
  else if (/ici\s+nasser/i.test(text)) setSpeaker('NASSER');
  if (/mode.*(écri|ecri|texte)/i.test(text)) setMode(true);
  else if (/mode.*(voc|oral|parle|speak)/i.test(text)) setMode(false);

  addMessage('user', text);
  history.push({ role: 'user', content: text });
  typingEl.classList.add('active');
  messagesEl.scrollTop = messagesEl.scrollHeight;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, session_id: SESSION_ID, speaker: currentSpeaker, datetime: new Date().toLocaleString() })
    });
    const data = await res.json();
    let reply = data.reply || "Je suis là.";

    // Screenshot
    if (data.screenshot) {
      const sdiv = document.createElement('div');
      sdiv.className = 'msg amin';
      const img = document.createElement('img');
      img.src = 'data:image/png;base64,' + data.screenshot;
      img.style.cssText = 'max-width:100%;border-radius:8px;border:1px solid rgba(255,255,255,0.1);margin-top:6px;';
      sdiv.appendChild(img);
      messagesEl.appendChild(sdiv);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // Couleur de fond
    const bgMatch = reply.match(/\[BGCOLOR:(#[a-fA-F0-9]{3,6}|[a-z]+)\]/i);
    if (bgMatch) changeBg(bgMatch[1]);

    typingEl.classList.remove('active');
    addMessage('assistant', reply);

    // Fichiers générés
    if (data.files?.length) showFileCards(data.files);

    history.push({ role: 'assistant', content: reply });
    if (!isWriteMode) speakText(reply);

  } catch (err) {
    typingEl.classList.remove('active');
    addMessage('assistant', "Problème de connexion. Réessaie.");
  }
  isLoading = false; sendBtn.disabled = false;
}

inputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});
inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

window.addEventListener('load', () => {
  window.speechSynthesis.getVoices();
  startWakeWord();
  setTimeout(() => {
    const welcomes = [
      'Yo. Je suis là. Dis-moi.',
      'AMIN connecté. Quoi de neuf ?',
      'Présent. C\'est quoi le programme ?',
      'Je t\'écoute. Lance-toi.',
      'Connecté. Qu\'est-ce qu\'on fait ?',
      'Prêt. Parle-moi.',
    ];
    const welcome = welcomes[Math.floor(Math.random() * welcomes.length)];
    addMessage('assistant', welcome);
    history.push({ role: 'assistant', content: welcome });
    speakText(welcome);
  }, 400);
});
</script>
